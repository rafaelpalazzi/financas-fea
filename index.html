<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finanças @ FEA-USP — Guia Interativo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────── */
:root{
  --bg:#030C18;
  --sur:rgba(255,255,255,.042);
  --sur2:rgba(255,255,255,.072);
  --bdr:rgba(255,255,255,.09);
  --G:#00FF94; --G2:rgba(0,255,148,.12); --GB:rgba(0,255,148,.22);
  --O:#FFB800; --O2:rgba(255,184,0,.12);  --OB:rgba(255,184,0,.22);
  --B:#38BDF8; --B2:rgba(56,189,248,.12); --BB:rgba(56,189,248,.22);
  --P:#F472B6; --P2:rgba(244,114,182,.12); --PB:rgba(244,114,182,.22);
  --R:#FF4444;
  --tx:rgba(237,244,255,.93);
  --mu:rgba(237,244,255,.58);
  --mu2:rgba(237,244,255,.36);
  --rad:14px; --rad2:20px;
  --max:1120px;
  --tick:34px; --hdr:60px;
  font-size:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Plus Jakarta Sans','Trebuchet MS',sans-serif;
  color:var(--tx); background:var(--bg);
  overflow-x:hidden; line-height:1.5;
}
/* grid bg */
body::before{
  content:''; position:fixed; inset:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(0,255,148,.032) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,148,.032) 1px, transparent 1px);
  background-size:44px 44px;
}
body::after{
  content:''; position:fixed; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 900px 600px at 12% -8%, rgba(0,255,148,.065),transparent 60%),
    radial-gradient(ellipse 700px 500px at 88% 22%, rgba(56,189,248,.05),transparent 55%),
    radial-gradient(ellipse 800px 600px at 50% 105%, rgba(255,184,0,.045),transparent 60%);
}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;color:var(--tx)}
.wrap{max-width:var(--max);margin:0 auto;padding:0 20px;position:relative;z-index:1}

/* ── TICKER ─────────────────────────────────────── */
.ticker{
  height:var(--tick); border-bottom:1px solid rgba(0,255,148,.1);
  background:rgba(0,0,0,.55); backdrop-filter:blur(12px);
  overflow:hidden; display:flex; align-items:center;
  position:relative; z-index:60;
}
.tick-wrap{display:flex; animation:tickscroll 38s linear infinite; white-space:nowrap}
.tick-item{
  display:inline-flex; align-items:center; gap:7px;
  padding:0 20px; border-right:1px solid rgba(255,255,255,.07);
  font-family:'JetBrains Mono',monospace; font-size:11px;
}
.tick-item .sym{color:var(--mu2)} .tick-item .val{font-weight:700}
.tick-item .chg.up{color:var(--G)} .tick-item .chg.dn{color:var(--R)}
@keyframes tickscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ── HEADER ─────────────────────────────────────── */
.topbar{
  position:sticky; top:0; z-index:50; height:var(--hdr);
  border-bottom:1px solid var(--bdr);
  background:rgba(3,12,24,.88); backdrop-filter:blur(18px);
  display:flex; align-items:center;
}
.topbar .inner{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.logomark{
  width:38px;height:38px;border-radius:12px;flex-shrink:0;
  background:var(--G2); border:1px solid rgba(0,255,148,.3);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--G);
}
.brand-t{font-family:'Syne',sans-serif;font-weight:800;font-size:15px}
.brand-s{font-size:11px;color:var(--mu2);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:7px;flex-shrink:0}

/* ── BUTTONS ─────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:8px 13px;border-radius:10px;
  border:1px solid var(--bdr);background:var(--sur);
  font-size:12px;font-weight:700;
  transition:all .12s ease;white-space:nowrap;
}
.btn:hover{background:var(--sur2);border-color:rgba(255,255,255,.15)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.35;pointer-events:none}
.btn.primary{background:var(--G2);border-color:var(--GB);color:var(--G)}
.btn.primary:hover{background:rgba(0,255,148,.18)}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:hover{background:var(--sur)}
.btn.sm{padding:6px 10px;font-size:11px}
.btn.gold{background:var(--O2);border-color:var(--OB);color:var(--O)}
.btn.blue{background:var(--B2);border-color:var(--BB);color:var(--B)}

/* ── PILLS / TAGS ─────────────────────────────────── */
.pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 9px;border-radius:999px;
  border:1px solid var(--bdr);background:var(--sur);
  font-size:11px;color:var(--mu);font-weight:700;white-space:nowrap;
}
.pill.g{border-color:rgba(0,255,148,.25);color:var(--G);background:var(--G2)}
.pill.o{border-color:rgba(255,184,0,.25);color:var(--O);background:var(--O2)}
.pill.b{border-color:rgba(56,189,248,.25);color:var(--B);background:var(--B2)}
.pill.p{border-color:rgba(244,114,182,.25);color:var(--P);background:var(--P2)}
.tag{
  display:inline-flex;padding:3px 8px;border-radius:6px;
  border:1px solid var(--bdr);background:var(--sur);
  font-size:11px;color:var(--mu2);font-weight:700;
}

/* ── LAYOUT ─────────────────────────────────────── */
.layout{display:grid;gap:20px;padding:20px 0 100px}
@media(min-width:1060px){.layout{grid-template-columns:268px 1fr;align-items:start}}
.rail{display:none}
@media(min-width:1060px){
  .rail{display:block;position:sticky;top:calc(var(--tick) + var(--hdr) + 14px)}
}
.rail-card{border:1px solid var(--bdr);background:var(--sur);border-radius:var(--rad2);overflow:hidden}
.rail-hd{
  padding:13px 14px 10px;border-bottom:1px solid var(--bdr);
  font-size:10px;font-weight:700;color:var(--mu2);letter-spacing:.8px;text-transform:uppercase;
}
.rail-body{padding:6px}
.rail-btn{
  width:100%;text-align:left;display:flex;align-items:center;gap:9px;
  padding:9px 9px;border-radius:10px;border:1px solid transparent;
  background:transparent;color:var(--mu);font-size:12px;font-weight:600;
  transition:all .12s ease;margin-bottom:2px;
}
.rail-btn:hover{background:var(--sur2);color:var(--tx)}
.rail-btn.active{background:var(--G2);border-color:rgba(0,255,148,.25);color:var(--G)}
.rail-num{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  width:20px;height:20px;border-radius:6px;
  background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--mu2);
}
.rail-btn.active .rail-num{background:var(--G2);color:var(--G)}
.rail-txt .t{font-size:12px} .rail-txt .k{font-size:10px;color:var(--mu2);margin-top:1px}
.rail-btn.active .rail-txt .k{color:rgba(0,255,148,.55)}
.rail-prog{padding:10px 14px 14px;border-top:1px solid var(--bdr)}
.rail-prog .lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--mu2);margin-bottom:5px}
.rail-prog .bar{height:4px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}
.rail-prog .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--G),var(--B));border-radius:999px;transition:width .35s ease}

/* ── SLIDE ─────────────────────────────────────── */
.section{min-height:calc(100vh - var(--tick) - var(--hdr) - 40px)}
.slide{animation:sEnter .38s cubic-bezier(.22,1,.36,1) both}
.slide.out{animation:sExit .2s ease both}
@keyframes sEnter{from{opacity:0;transform:translateY(20px) scale(.985);filter:blur(5px)}to{opacity:1;transform:none;filter:none}}
@keyframes sExit{from{opacity:1;transform:none}to{opacity:0;transform:translateY(-14px)}}
.sk{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sk-icon{
  width:42px;height:42px;border-radius:14px;flex-shrink:0;
  border:1px solid rgba(0,255,148,.25);background:var(--G2);
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.sk-text{font-size:12px;font-weight:700;color:var(--mu)}
.h1{
  font-family:'Syne',sans-serif;font-size:38px;font-weight:800;
  line-height:1.08;letter-spacing:-.4px;margin-bottom:18px;
}
@media(max-width:640px){.h1{font-size:28px}}
.h1 .hl{color:var(--G)}

/* ── CARDS ─────────────────────────────────────── */
.card{border:1px solid var(--bdr);background:var(--sur);border-radius:var(--rad2);overflow:hidden}
.card.gg{border-color:rgba(0,255,148,.18);box-shadow:0 0 35px rgba(0,255,148,.055)}
.card.og{border-color:rgba(255,184,0,.18);box-shadow:0 0 35px rgba(255,184,0,.055)}
.card.bg{border-color:rgba(56,189,248,.18);box-shadow:0 0 35px rgba(56,189,248,.055)}
.card-hd{
  padding:13px 16px 11px;border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.card-hd h3{
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  color:var(--mu);text-transform:uppercase;letter-spacing:.5px;
}
.card-body{padding:15px}

/* ── GRID UTILS ─────────────────────────────────── */
.g2{display:grid;gap:15px}
@media(min-width:820px){.g2{grid-template-columns:1fr 1fr}}
.g3{display:grid;gap:15px}
@media(min-width:820px){.g3{grid-template-columns:2fr 1fr}}

/* ── STAT ─────────────────────────────────────── */
.stat{padding:14px 15px;border:1px solid var(--bdr);border-radius:var(--rad);background:var(--sur)}
.stat .lbl{font-size:10px;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:.5px}
.stat .val{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;margin-top:5px;line-height:1}
.stat .sub{font-size:11px;color:var(--mu);margin-top:5px}
.stat.sg{border-color:rgba(0,255,148,.2)} .stat.sg .val{color:var(--G)}
.stat.so{border-color:rgba(255,184,0,.2)} .stat.so .val{color:var(--O)}
.stat.sb{border-color:rgba(56,189,248,.2)} .stat.sb .val{color:var(--B)}
.stat.sp{border-color:rgba(244,114,182,.2)} .stat.sp .val{color:var(--P)}

/* ── BOX ─────────────────────────────────────── */
.box{padding:12px 14px;border:1px solid var(--bdr);border-radius:var(--rad);background:rgba(255,255,255,.025)}
.box h4{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;margin-bottom:5px}
.box p,.box .mu{color:var(--mu);font-size:12px;line-height:1.55}
.box.soft{background:rgba(255,255,255,.038)}
.box.bg{border-color:var(--GB);background:var(--G2)} .box.bg h4{color:var(--G)}
.box.bo{border-color:var(--OB);background:var(--O2)} .box.bo h4{color:var(--O)}
.box.bb{border-color:var(--BB);background:var(--B2)} .box.bb h4{color:var(--B)}
.box.bp{border-color:var(--PB);background:var(--P2)} .box.bp h4{color:var(--P)}
.ul{list-style:none}
.ul li{padding:4px 0 4px 16px;position:relative;color:var(--mu);font-size:12px;line-height:1.5}
.ul li::before{content:'›';position:absolute;left:0;color:var(--G);font-weight:700}
.ul li strong{color:var(--tx)}
.ul li+li{border-top:1px solid rgba(255,255,255,.04)}
.hr{height:1px;background:var(--bdr);border:none;margin:10px 0}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.mono{font-family:'JetBrains Mono',monospace}

/* ── AREA ACCORDION ─────────────────────────────── */
.ac{
  border:1px solid var(--bdr);border-radius:var(--rad2);
  background:var(--sur);cursor:pointer;
  transition:border-color .14s ease,background .14s ease;
  margin-bottom:9px;
}
.ac:hover{background:var(--sur2)}
.ac.open{border-color:rgba(0,255,148,.28)}
.ac-hdr{padding:13px 15px;display:flex;align-items:center;gap:11px}
.ac-icon{
  width:46px;height:46px;border-radius:13px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  border:1px solid var(--bdr);
}
.ac-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800}
.ac-sub{font-size:11px;color:var(--mu);margin-top:2px}
.ac-chev{margin-left:auto;color:var(--mu2);font-size:16px;transition:transform .2s ease;line-height:1}
.ac.open .ac-chev{transform:rotate(180deg);color:var(--G)}
.ac-body{
  display:none;padding:0 15px 15px;border-top:1px solid var(--bdr);
  padding-top:13px;animation:fadeUp .22s ease both;
}
.ac.open .ac-body{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── COMPANY GRID ────────────────────────────────── */
.co-grid{display:grid;gap:8px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
.co-card{
  padding:11px 12px;border:1px solid var(--bdr);border-radius:var(--rad);
  background:var(--sur);cursor:default;transition:all .13s ease;text-align:center;
}
.co-card:hover{border-color:rgba(0,255,148,.2);background:var(--sur2);transform:translateY(-2px)}
.co-card .co-n{font-weight:700;font-size:12px}
.co-card .co-t{font-size:10px;color:var(--mu2);margin-top:3px}
.cf-btns{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.cf-btn{
  padding:5px 11px;border-radius:8px;border:1px solid var(--bdr);
  background:var(--sur);color:var(--mu);font-size:11px;font-weight:700;
  cursor:pointer;transition:all .12s ease;
}
.cf-btn:hover{background:var(--sur2);color:var(--tx)}
.cf-btn.active{background:var(--G2);border-color:var(--GB);color:var(--G)}

/* ── ROADMAP ─────────────────────────────────────── */
.rm-item{display:flex;gap:14px;padding-bottom:20px;position:relative}
.rm-item::before{content:'';position:absolute;left:16px;top:35px;bottom:0;width:2px;background:linear-gradient(to bottom,rgba(0,255,148,.3),transparent)}
.rm-item:last-child::before{display:none}
.rm-dot{
  width:34px;height:34px;border-radius:11px;flex-shrink:0;
  background:var(--G2);border:2px solid rgba(0,255,148,.35);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--G);
}
.rm-c .rt{font-family:'Syne',sans-serif;font-weight:800;font-size:14px}
.rm-c .rp{font-size:10px;color:var(--mu2);margin-bottom:7px}

/* ── SKILL BARS ─────────────────────────────────── */
.sk-bar{margin-bottom:13px}
.sk-bar .top{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px;font-weight:700}
.sk-bar .top .pct{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mu2)}
.sk-bar .trk{height:6px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}
.sk-bar .fill{height:100%;border-radius:999px;width:0%;transition:width .9s cubic-bezier(.22,1,.36,1)}
.sk-bar .fill.g{background:linear-gradient(90deg,var(--G),rgba(0,255,148,.45))}
.sk-bar .fill.o{background:linear-gradient(90deg,var(--O),rgba(255,184,0,.45))}
.sk-bar .fill.b{background:linear-gradient(90deg,var(--B),rgba(56,189,248,.45))}
.sk-bar .fill.p{background:linear-gradient(90deg,var(--P),rgba(244,114,182,.45))}
.sk-bar .note{font-size:10px;color:var(--mu2);margin-top:3px}

/* ── QUIZ ─────────────────────────────────────── */
.qbox{padding:13px;border:1px solid var(--bdr);border-radius:var(--rad2);background:var(--sur);margin-bottom:11px}
.qbox .qt{font-weight:700;font-size:13px;margin-bottom:9px}
.qopt{
  width:100%;text-align:left;padding:9px 11px;border-radius:9px;
  border:1px solid var(--bdr);background:rgba(255,255,255,.02);
  font-size:12px;margin-top:5px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  transition:all .12s ease;
}
.qopt:hover{background:var(--sur2);border-color:rgba(255,255,255,.16)}
.qopt.sel{border-color:rgba(56,189,248,.4);background:var(--B2)}
.qopt.ok{background:var(--G2);border-color:rgba(0,255,148,.35)}
.qopt.wrong{background:rgba(255,68,68,.1);border-color:rgba(255,68,68,.35)}
.qwhy{margin-top:7px;font-size:11px;color:var(--mu);padding:7px 9px;background:rgba(0,0,0,.25);border-radius:8px}

/* ── CHECKLIST ─────────────────────────────────── */
.chk-item{
  display:flex;align-items:flex-start;gap:11px;padding:11px 13px;
  border:1px solid var(--bdr);border-radius:var(--rad);background:var(--sur);
  margin-bottom:7px;cursor:pointer;transition:all .13s ease;user-select:none;
}
.chk-item:hover{background:var(--sur2)}
.chk-item.done{background:var(--G2);border-color:rgba(0,255,148,.3)}
.chk-box{
  width:22px;height:22px;flex-shrink:0;border-radius:7px;
  border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;
  font-size:12px;transition:all .13s ease;margin-top:1px;
}
.chk-item.done .chk-box{background:var(--G);border-color:var(--G);color:#000}
.chk-t{font-weight:700;font-size:12px} .chk-s{font-size:11px;color:var(--mu);margin-top:2px}
.chk-item.done .chk-t{color:var(--G)}

/* ── FOOTER CONTROLS ─────────────────────────────── */
.fctrl{
  position:fixed;bottom:0;left:0;right:0;z-index:60;
  padding:12px 0 14px;
  background:linear-gradient(to top,rgba(3,12,24,.98) 55%,transparent);
  pointer-events:none;
}
.fctrl .inner{display:flex;align-items:center;justify-content:space-between;gap:12px;pointer-events:auto}
.kbdhint{display:none;gap:7px}
@media(min-width:760px){.kbdhint{display:flex}}

/* ── MODAL ─────────────────────────────────────── */
.modal{
  position:fixed;inset:0;z-index:80;display:none;
  align-items:center;justify-content:center;padding:18px;
  background:rgba(0,0,0,.65);backdrop-filter:blur(14px);
}
.modal.open{display:flex}
.modal-panel{width:min(720px,100%);border:1px solid rgba(0,255,148,.2);background:#06111E;border-radius:24px;overflow:hidden}
.mpH{padding:15px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.mpH .t{font-family:'Syne',sans-serif;font-weight:800;font-size:16px}
.mpH .s{font-size:11px;color:var(--mu2);margin-top:3px}
.mpB{padding:18px;color:var(--mu);line-height:1.6;max-height:60vh;overflow-y:auto}
.mpB strong{color:var(--tx)}
.mpF{padding:11px 18px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end}

/* ── PAGE MODE ─────────────────────────────────── */
.pg-note{padding:11px 14px;border:1px solid var(--bdr);border-radius:var(--rad);background:var(--sur);font-size:12px;color:var(--mu);margin-bottom:12px}

/* ── ANIMATIONS ─────────────────────────────────── */
@keyframes cntUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.stat{animation:cntUp .4s ease both}
.stat:nth-child(2){animation-delay:.07s}
.stat:nth-child(3){animation-delay:.14s}
.stat:nth-child(4){animation-delay:.21s}
</style>
</head>
<body>

<!-- TICKER -->
<div class="ticker" aria-hidden="true">
  <div class="tick-wrap" id="tickerTrack"></div>
</div>

<!-- HEADER -->
<header class="topbar">
  <div class="wrap">
    <div class="inner">
      <div class="brand">
        <div class="logomark">FIN</div>
        <div>
          <div class="brand-t" id="topTitle">Finanças @ FEA-USP</div>
          <div class="brand-s" id="topSub">Ingressantes · 1 / 9</div>
        </div>
      </div>
      <div class="hdr-right">
        <button class="btn sm" id="modeBtn">Modo página</button>
        <button class="btn ghost sm" id="homeBtn">Início</button>
        <span class="pill" id="kbdP" style="display:none">← → / espaço</span>
      </div>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="wrap">
  <div class="layout">
    <aside class="rail">
      <div class="rail-card">

function buildTicker(){

      <span class="sym">${t.sym}</span>
      <span class="val">${t.val}</span>

function renderRail(){
  const r = $("#rail");
  r.innerHTML = DATA.sections.map((s,i)=>`
    <button class="rail-btn${i===S.idx?' active':''}" data-i="${i}">
      <div class="rail-num">${i+1}</div>
      <div class="rail-txt">
        <div class="t">${s.emoji} ${s.title}</div>
        <div class="k">${s.kicker}</div>
      </div>
    </button>
  `).join("");
  $$(".rail-btn").forEach(b=>{ b.onclick=()=>go(parseInt(b.dataset.i)); });
  const pct = Math.round(((S.idx+1)/DATA.sections.length)*100);
  $("#progPct").textContent = pct+"%";
  $("#progBar").style.width = pct+"%";
}
function setTopbar(){
  const s = DATA.sections[S.idx];
  $("#topTitle").textContent = `${s.emoji} ${s.title}`;
  $("#topSub").textContent = `Ingressantes · ${S.idx+1} / ${DATA.sections.length}`;
  $("#modeBtn").textContent = S.mode==="present"?"Modo página":"Modo apresentação";
  $("#fctrl").style.display = S.mode==="present"?"block":"none";
  $("#prevBtn").disabled = S.idx===0;
  $("#nextBtn").disabled = S.idx===DATA.sections.length-1;
}

// 7 — QUIZ
function rQuiz(){
  const answered = Object.keys(S.qAns).length;
  const total = DATA.quiz.length;
  const score = DATA.quiz.reduce((acc,qq,i)=>{
    const a=S.qAns[i]; return acc+(a!==undefined&&qq.opts[a]?.ok?1:0);
  },0);
  const qHtml = DATA.quiz.map((qq,i)=>{
    const chosen = S.qAns[i];
    const opts = qq.opts.map((o,j)=>{
      let cls="qopt";
      if(chosen===j) cls+=" sel";
      if(S.qReveal){ if(o.ok) cls+=" ok"; else if(chosen===j) cls+=" wrong"; }
      const badge = S.qReveal&&o.ok?`<span class="pill g">✓</span>`:
                    S.qReveal&&chosen===j&&!o.ok?`<span class="pill" style="border-color:rgba(255,68,68,.3);color:var(--R)">✗</span>`:``;
      return `<button class="${cls}" data-q="${i}" data-opt="${j}"><span>${o.t}</span>${badge}</button>
              ${S.qReveal&&o.ok?`<div class="qwhy">💡 ${qq.why}</div>`:''}`;
    }).join("");
    return `<div class="qbox"><div class="qt">${i+1}. ${qq.q}</div>${opts}</div>`;
  }).join("");
  const emoji = score>=4?"🏆":score>=2?"📈":"🌱";
  return shell("5 conceitos essenciais","Quiz de","Finanças",`
    <div class="g3">
      <div class="card">
        <div class="card-hd"><h3>Perguntas</h3><span class="pill">${answered}/${total} respondidas</span></div>

              <div style="font-size:30px;margin-bottom:7px">${emoji}</div>
              <div class="lbl">Acertos</div>
              <div class="val">${score}/${total}</div>
              <div class="sub">${score>=4?"Excelente! Você está no caminho certo.":score>=2?"Bom começo — explore as explicações.":"Continue — cada erro é aprendizado."}</div>
            </div>
            <div class="box soft" style="margin-top:11px">

function renderSlide(){
  const s = DATA.sections[S.idx];
  const fn = RENDERERS[s.id] || rWelcome;
  const html = fn();
  const host = $("#slideHost");
  const old = host.firstElementChild;
  if(old){
    old.classList.add("out");
    setTimeout(()=>{ host.innerHTML=html; wire(); animSkills(); animCounters(); }, 180);
  } else {
    host.innerHTML=html; wire(); animSkills(); animCounters();
  }
  renderRail(); setTopbar();
}

// =====================================================
function wire(){
  // company filter
  $$("[data-cf]").forEach(b=>{ b.onclick=()=>{ S.coFilter=b.dataset.cf; renderSlide(); }; });
  // area accordion
  $$("[data-area]").forEach(el=>{
    el.onclick=(e)=>{
      if(e.target.closest("button")&&!e.target.closest(".ac-hdr")) return;
      S.openArea = S.openArea===el.dataset.area ? null : el.dataset.area;
      renderSlide();
    };
  });
  // quiz
  $$(".qopt[data-q]").forEach(b=>{
    b.onclick=()=>{ S.qAns[parseInt(b.dataset.q)]=parseInt(b.dataset.opt); renderSlide(); };
  });
  const rb=$("#revBtn"), rs=$("#rstBtn");
  if(rb) rb.onclick=()=>{ S.qReveal=true; renderSlide(); };
  if(rs) rs.onclick=()=>{ S.qAns={}; S.qReveal=false; renderSlide(); };
  // checklist
  $$("[data-chk]").forEach(el=>{
    el.onclick=()=>{ S.checks[el.dataset.chk]=!S.checks[el.dataset.chk]; renderSlide(); };
  });
}

function animSkills(){
  setTimeout(()=>{
    $$(".sk-bar .fill[data-pct]").forEach(b=>{ b.style.width=b.dataset.pct+"%"; });
  }, 120);
}

function animCounters(){
  $$(".cnt[data-to]").forEach(el=>{
    const to=parseInt(el.dataset.to);
    let v=0;
    const step=()=>{ v++; el.textContent=v; if(v<to) requestAnimationFrame(step); };
    requestAnimationFrame(step);
  });
}

// =====================================================
// PAGE MODE
// =====================================================
function renderPageMode(){
  $("#pageHost").innerHTML = `
    <div class="pg-note">📖 Modo página: role para ver tudo. Clique para abrir uma seção em modo apresentação.</div>
    <div style="display:grid;gap:11px">
      ${DATA.sections.map((s,i)=>`
        <div class="card">
          <div class="card-hd"><h3>${s.emoji} ${s.title}</h3><span class="pill">${i+1}/${DATA.sections.length}</span></div>
          <div class="card-body">
            <p style="color:var(--mu);font-size:12px">${s.kicker}</p>
            <button class="btn primary" data-open="${i}" style="margin-top:10px">Abrir em modo apresentação</button>
          </div>
        </div>
      `).join("")}
    </div>
  `;
  $$("[data-open]").forEach(b=>{
    b.onclick=()=>{ S.mode="present"; go(parseInt(b.dataset.open)); };
  });
}

// =====================================================
// MAIN RENDER
// =====================================================
function render(){
  setTopbar(); renderRail();
  if(S.mode==="present"){
    $("#pageHost").style.display="none";
    $("#slideHost").style.display="block";
    renderSlide();
  } else {
    $("#slideHost").style.display="none";
    $("#pageHost").style.display="block";
    renderPageMode();
  }
}

// =====================================================
// NAVIGATION
// =====================================================
function go(i){
  S.idx=clamp(i,0,DATA.sections.length-1);
  if(S.mode==="present") renderSlide();
  else { renderRail(); setTopbar(); window.scrollTo({top:0,behavior:"smooth"}); }
}
function prev(){ go(S.idx-1); }
function next(){ go(S.idx+1); }

// =====================================================
// EVENTS
// =====================================================
$("#prevBtn").onclick=prev;
$("#nextBtn").onclick=next;
$("#homeBtn").onclick=()=>go(0);
$("#modeBtn").onclick=()=>{ S.mode=S.mode==="present"?"page":"present"; render(); window.scrollTo({top:0,behavior:"smooth"}); };
$("#mClose").onclick=closeModal;
$("#mOk").onclick=closeModal;
$("#modal").addEventListener("click",e=>{ if(e.target.id==="modal") closeModal(); });
window.addEventListener("keydown",e=>{
  if(S.mode!=="present") return;
  if(e.key==="ArrowLeft") prev();
  if(e.key==="ArrowRight"||e.key===" "){ e.preventDefault(); next(); }
  if(e.key.toLowerCase()==="m"){ S.mode="page"; render(); }
});

// show kbd hint on desktop
if(window.innerWidth>=800){ $("#kbdP").style.display="inline-flex"; }

// =====================================================
// INIT
// =====================================================
buildTicker();
render();
</script>
